<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="renderer" content="webkit">
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
        <title>{:lang('install/title')}</title>
        <link rel="stylesheet" href="__ROOT__/static_new/layui/css/layui.css">
        <link rel="stylesheet" href="__ROOT__/static_new/css/admin_style.css">
        <link rel="stylesheet" href="__ROOT__/static_new/css/install.css">
        <script type="text/javascript" src="__ROOT__/static_new/layui/layui.js"></script>
        <script>
            var ROOT_PATH = "__ROOT__", ADMIN_PATH="{$_SERVER['SCRIPT_NAME']}";
        </script>
    </head>
<body>
<!-- 全屏水流动画：SVG 噪声位移，叠在背景图之上、内容之下 -->
<div class="install-water-overlay" aria-hidden="true">
    <svg class="install-water-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="none" focusable="false">
        <defs>
            <linearGradient id="installWaterGrad" x1="0%" y1="100%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#7ecfb8" stop-opacity="0.38"/>
                <stop offset="40%" stop-color="#40a88a" stop-opacity="0.22"/>
                <stop offset="70%" stop-color="#6bb8c8" stop-opacity="0.28"/>
                <stop offset="100%" stop-color="#8fd4c4" stop-opacity="0.32"/>
            </linearGradient>
            <filter id="installWaterFlow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
                <feTurbulence type="fractalNoise" baseFrequency="0.011 0.028" numOctaves="4" seed="11" result="noise">
                    <animate attributeName="baseFrequency" dur="24s"
                        values="0.011 0.028;0.019 0.042;0.014 0.035;0.017 0.04;0.011 0.028"
                        keyTimes="0;0.25;0.5;0.75;1"
                        repeatCount="indefinite"/>
                </feTurbulence>
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="16" xChannelSelector="R" yChannelSelector="G"/>
            </filter>
        </defs>
        <rect width="1600" height="900" fill="url(#installWaterGrad)" filter="url(#installWaterFlow)"/>
    </svg>
</div>
<div class="header">
    {if condition="$new_version eq 1"} 
    <h2>{:lang('install/header')}</h2>
    <h1>{:lang('install/header1')}</h1>
    {else /}
    <h1>{:lang('install/header')} {:lang('install/header1')}</h1>
    {/if}
</div>
