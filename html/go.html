<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>maccmspro.com模板跳转页面 | 正在前往目标网站</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #aed2a4, #2b5e63, #9ad095);
            color: #fff;
            padding: 20px;
            overflow-x: hidden;
        }
        
        .jump-container {
            max-width: 595px;
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 20px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }
        
        .jump-container::before {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(120, 119, 198, 0.3) 0%, transparent 70%);
            top: -80px;
            right: -80px;
            border-radius: 50%;
            z-index: 0;
        }
        
        .jump-container::after {
            content: '';
            position: absolute;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(255, 119, 198, 0.2) 0%, transparent 70%);
            bottom: -60px;
            left: -60px;
            border-radius: 50%;
            z-index: 0;
        }
        
        .content {
            position: relative;
            z-index: 2;
        }
        
        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #4cd964, #25fcde);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }
        
        .subtitle {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        .destination-info {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 25px;
            margin: 20px 0;
            text-align: left;
            border-left: 4px solid #4cd964;
        }
        
        .destination-info h3 {
            font-size: 1.0rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }
        
        .destination-info h3 i {
            margin-right: 10px;
            color: #4cd964;
        }
        
        .destination-url {
            display: block;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 5px;
            word-break: break-all;
        }
        
        .timer-container {
            margin: 20px 0;
        }
        
        .countdown {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #4cd964, #3297f1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .progress-container {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4cd964, #3297f1);
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        
        .progress-text {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            display: flex;
            justify-content: space-between;
        }
        
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 80px;
        }
        
        .btn-primary {
            background: linear-gradient(90deg, #41e388, #3297f1);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(106, 17, 203, 0.3);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
        }
        
        .btn i {
            margin-right: 10px;
        }
        
        .hint {
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #fff;
        }
        
        .logo span {
            background: linear-gradient(90deg, #4cd964, #25defc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .jump-container {
                padding: 40px 25px;
            }
            
            h1 {
                font-size: 2.2rem;
            }
            
            .countdown {
                font-size: 3.5rem;
            }
            
            .btn {
                min-width: 160px;
                padding: 14px 24px;
            }
            
            .destination-info {
                padding: 20px;
            }
        }
        
        @media (max-width: 576px) {
            h1 {
                font-size: 1.8rem;
            }
            
            .subtitle {
                font-size: 1rem;
            }
            
            .countdown {
                font-size: 1.8rem;
            }
            
            .action-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                max-width: 300px;
            }
            
            .jump-container {
                padding: 30px 20px;
            }
        }
        
        .pulse {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #4cd964;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(76, 217, 100, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(76, 217, 100, 0); }
            100% { box-shadow: 0 0 0 0 rgba(76, 217, 100, 0); }
        }
    </style>
</head>
<body>
    <div class="jump-container">
        <div class="content">
            <div class="logo">maccmspro.com<span> Redirect</span></div>
            <h1>即将跳转到新窗口目标网站</h1>
            <p class="subtitle">您将在 <span id="countdown">5</span> 秒后自动跳转至目标网站。如需立即访问，请点击下方按钮。</p>
            
            <div class="destination-info">
                <h3><i class="fas fa-external-link-alt"></i> 目标网站信息</h3>
                <span class="destination-url" id="destinationUrl">https://www.maccmspro.com</span>
                <p>这是一个安全、可信的高端服务平台，为用户提供专业售后保障。</p>
            </div>
            
            <div class="timer-container">
                <div class="countdown" id="countdownDisplay">10</div>
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="progress-text">
                    <span>跳转进度</span>
                    <span id="progressPercent">0%</span>
                </div>
            </div>
            
            <div class="action-buttons">
                <button class="btn btn-primary" id="jumpNowBtn">
                    <i class="fas fa-rocket"></i> 立即跳转
                </button>
                <button class="btn btn-secondary" id="cancelBtn">
                    <i class="fas fa-times"></i> 取消跳转
                </button>
                <button class="btn btn-secondary" id="restartBtn">
                    <i class="fas fa-redo"></i> 重新计时
                </button>
            </div>
            
            <p class="hint">
                <span class="pulse"></span> 安全提示：maccmspro.com主题模板提供售后保障，安全放心！
            </p>
        </div>
    </div>

<script>
        // 配置参数
    const config = {
        totalTime: 5, // 倒计时总秒数
        destinationUrl: "https://www.maccmspro.com", // 目标网址
        destinationName: "maccmspro.com模板官网" // 目标网站名称（保留原文字）
    };
    
    // 初始化变量
    let timeLeft = config.totalTime;
    let countdownInterval;
    let isCancelled = false;
    let hasJumped = false; // 标记是否已经跳过
    
    // DOM元素
    const countdownElement = document.getElementById('countdown');
    const countdownDisplay = document.getElementById('countdownDisplay');
    const progressBar = document.getElementById('progressBar');
    const progressPercent = document.getElementById('progressPercent');
    const destinationUrlElement = document.getElementById('destinationUrl');
    const jumpNowBtn = document.getElementById('jumpNowBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const restartBtn = document.getElementById('restartBtn');
    
    // 设置目标网址
    destinationUrlElement.textContent = config.destinationUrl;
    
    // 更新倒计时和进度条
    function updateCountdown() {
        if (hasJumped || isCancelled) return;
        
        countdownElement.textContent = timeLeft;
        countdownDisplay.textContent = timeLeft;
        
        // 计算进度百分比
        const progress = 100 - (timeLeft / config.totalTime) * 100;
        progressBar.style.width = `${progress}%`;
        progressPercent.textContent = `${Math.round(progress)}%`;
        
        // 如果倒计时结束，执行跳转
        if (timeLeft <= 0) {
            performRedirect();
        } else {
            timeLeft--;
        }
    }
    
    // 执行跳转 - 新窗口打开
    function performRedirect() {
        if (hasJumped) return; // 防止重复跳转
        
        clearInterval(countdownInterval);
        hasJumped = true; // 标记为已跳转
        
        // 跳转前显示提示
        countdownDisplay.textContent = "跳转中...";
        countdownDisplay.style.fontSize = "1rem";
        progressBar.style.background = "linear-gradient(90deg, #4cd964, #5ac8fa)";
        
        // 禁用所有按钮
        jumpNowBtn.disabled = true;
        cancelBtn.disabled = true;
        restartBtn.disabled = true;
        jumpNowBtn.style.opacity = "0.6";
        cancelBtn.style.opacity = "0.6";
        restartBtn.style.opacity = "0.6";
        
        // 模拟短暂延迟后跳转
        setTimeout(() => {
            // 在新窗口打开目标网址
            const newWindow = window.open(config.destinationUrl, '_blank');
            
            if (newWindow) {
                // 新窗口打开成功
                newWindow.focus();
                
                // 更新显示状态
                setTimeout(() => {
                    countdownDisplay.textContent = "已在新窗口打开";
                    countdownDisplay.style.fontSize = "1.5rem";
                    countdownDisplay.style.background = "linear-gradient(90deg, #4cd964, #5ac8fa)";
                    countdownDisplay.style.webkitBackgroundClip = "text";
                    countdownDisplay.style.backgroundClip = "text";
                    countdownDisplay.style.color = "transparent";
                    
                    // 创建重新启动按钮
                    const resetBtn = document.createElement('button');
                    resetBtn.innerHTML = '<i class="fas fa-redo"></i> 重置页面';
                    resetBtn.style.padding = '12px 24px';
                    resetBtn.style.marginTop = '20px';
                    resetBtn.style.background = 'linear-gradient(90deg, #6a11cb, #2575fc)';
                    resetBtn.style.color = 'white';
                    resetBtn.style.border = 'none';
                    resetBtn.style.borderRadius = '8px';
                    resetBtn.style.cursor = 'pointer';
                    resetBtn.style.fontSize = '1.1rem';
                    resetBtn.onclick = function() {
                        location.reload();
                    };
                    
                    // 添加按钮到页面
                    const actionSection = document.querySelector('.action-section') || 
                                         document.querySelector('.timer-section') || 
                                         document.querySelector('.destination-card');
                    if (actionSection) {
                        actionSection.appendChild(resetBtn);
                    }
                }, 300);
                
            } else {
                // 如果浏览器阻止了新窗口，提示用户手动点击
                countdownDisplay.textContent = "请手动点击";
                countdownDisplay.style.fontSize = "1.5rem";
                
                // 重新启用立即跳转按钮
                jumpNowBtn.disabled = false;
                jumpNowBtn.style.opacity = "1";
                jumpNowBtn.innerHTML = '<i class="fas fa-external-link-alt"></i> 手动打开新窗口';
                jumpNowBtn.onclick = function() {
                    const manualWindow = window.open(config.destinationUrl, '_blank');
                    if (manualWindow) {
                        manualWindow.focus();
                        jumpNowBtn.disabled = true;
                        jumpNowBtn.style.opacity = "0.6";
                        countdownDisplay.textContent = "已在新窗口打开";
                        countdownDisplay.style.fontSize = "1.5rem";
                    }
                };
            }
        }, 500);
    }
    
    // 立即跳转
    function jumpNow() {
        if (!isCancelled && !hasJumped) {
            performRedirect();
        }
    }
    
    // 取消跳转
    function cancelRedirect() {
        if (!isCancelled && !hasJumped) {
            clearInterval(countdownInterval);
            isCancelled = true;
            hasJumped = true; // 取消后也不能再跳转
            countdownDisplay.textContent = "已取消";
            countdownDisplay.style.color = "rgb(49, 241, 185)";
            progressBar.style.background = "rgb(49, 241, 185)";
            progressPercent.textContent = "已取消";
            
            // 更新按钮状态
            jumpNowBtn.innerHTML = '<i class="fas fa-play-circle"></i> 跳转已取消';
            jumpNowBtn.disabled = true;
            jumpNowBtn.style.opacity = "0.6";
            cancelBtn.disabled = true;
            cancelBtn.style.opacity = "0.6";
            
            // 添加重置按钮
            const resetBtn = document.createElement('button');
            resetBtn.innerHTML = '<i class="fas fa-redo"></i> 重置页面';
            resetBtn.style.padding = '12px 24px';
            resetBtn.style.marginTop = '20px';
            resetBtn.style.background = 'linear-gradient(90deg, #6a11cb, #2575fc)';
            resetBtn.style.color = 'white';
            resetBtn.style.border = 'none';
            resetBtn.style.borderRadius = '8px';
            resetBtn.style.cursor = 'pointer';
            resetBtn.style.fontSize = '1.1rem';
            resetBtn.onclick = function() {
                location.reload();
            };
            
            const actionSection = document.querySelector('.action-section') || 
                                 document.querySelector('.timer-section') || 
                                 document.querySelector('.destination-card');
            if (actionSection) {
                actionSection.appendChild(resetBtn);
            }
        }
    }
    
    // 重新开始计时
    function restartTimer() {
        if (hasJumped) return; // 如果已经跳过，不能重新开始
        
        clearInterval(countdownInterval);
        timeLeft = config.totalTime;
        isCancelled = false;
        
        // 重置显示
        countdownDisplay.textContent = timeLeft;
        countdownElement.textContent = timeLeft;
        countdownDisplay.style.color = "";
        countdownDisplay.style.fontSize = "";
        progressBar.style.background = "linear-gradient(90deg, #4cd964, #5ac8fa)";
        progressBar.style.width = "0%";
        progressPercent.textContent = "0%";
        
        // 重置按钮状态
        jumpNowBtn.disabled = false;
        jumpNowBtn.style.opacity = "1";
        cancelBtn.disabled = false;
        cancelBtn.style.opacity = "1";
        
        // 启动倒计时
        countdownInterval = setInterval(updateCountdown, 1000);
        updateCountdown();
    }
    
    // 事件监听
    jumpNowBtn.addEventListener('click', jumpNow);
    cancelBtn.addEventListener('click', cancelRedirect);
    restartBtn.addEventListener('click', restartTimer);
    
    // 初始启动倒计时
    countdownInterval = setInterval(updateCountdown, 1000);
    updateCountdown();
    
    // 添加键盘快捷键支持
    document.addEventListener('keydown', function(event) {
        // 空格键 - 立即跳转
        if (event.code === 'Space') {
            event.preventDefault();
            if (!isCancelled && !hasJumped) {
                jumpNow();
            }
        }
        // Escape键 - 取消跳转
        else if (event.code === 'Escape' && !isCancelled && !hasJumped) {
            cancelRedirect();
        }
        // R键 - 重新开始
        else if (event.code === 'KeyR' && !hasJumped) {
            restartTimer();
        }
    });
    
    // 添加页面可见性API支持
    document.addEventListener('visibilitychange', function() {
        if (document.hidden) {
            // 页面隐藏时暂停计时
            clearInterval(countdownInterval);
        } else if (!isCancelled && !hasJumped) {
            // 页面可见时恢复计时
            countdownInterval = setInterval(updateCountdown, 1000);
        }
    });
</script>

</body>
</html>
