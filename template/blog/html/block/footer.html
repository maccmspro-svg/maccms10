<div id="footer">
  <div class="site-footer">
    <p>
    <ul class="link">
      <span>友情链接 :</span>
      {maccms:link num="30" by="sort" order="asc"}
      <li><a href="{$vo.link_url}" target="_blank" rel="nofollow">{$vo.link_name}</a></li>
      {/maccms:link}
    </ul>
    </p>
    <p class="copyright">{$maccms.site_name} | {$maccms.site_icp}</p>
  </div>
  <div id="totop"><i class="icon-up-open"></i></div>
</div>
<script type="text/javascript" src="{$maccms.path_tpl}skin/js/bootstrap.js"></script>
<script type="text/javascript" src="{$maccms.path_tpl}skin/js/traveler.js"></script>
<script type="text/javascript" src="{$maccms.path_tpl}skin/js/jquery.lazyload.min.js"></script>
<script type="text/javascript" src="{$maccms.path_tpl}skin/js/affix.js"></script>
<script type="text/javascript" src="{$maccms.path_tpl}skin/js/wp-embed.min.js"></script>
<script type="text/javascript">
$(function(){
  $(window).scroll(function(){
    if($(window).scrollTop()>=200){$('#totop').slideDown(200);}else{$('#totop').slideUp(200);}
  });
  $('#totop').click(function(){$('body,html').animate({scrollTop:0},200);});
  $("img").lazyload({effect:"fadeIn",failure_limit:10,threshold:50});
});
</script>
